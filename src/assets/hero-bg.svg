<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd9a0"/>
      <stop offset="35%" stop-color="#ff9d6c"/>
      <stop offset="70%" stop-color="#5fb8c9"/>
      <stop offset="100%" stop-color="#0d7d8c"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f9aa8"/>
      <stop offset="100%" stop-color="#0a5f6e"/>
    </linearGradient>
    <linearGradient id="seaGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe7b8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffe7b8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="1600" height="620" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="800" cy="380" r="110" fill="#fff3d6" opacity="0.9"/>
  <circle cx="800" cy="380" r="160" fill="#ffe7b8" opacity="0.35"/>

  <!-- far islands -->
  <path d="M0 540 L120 470 L260 540 L420 460 L600 540 L760 480 L940 540 L1120 470 L1300 540 L1460 480 L1600 540 L1600 620 L0 620 Z" fill="#0a6f7e" opacity="0.55"/>

  <!-- mid islands (limestone karsts) -->
  <path d="M0 600 L80 500 L160 600 Z" fill="#0a5f6e"/>
  <path d="M250 610 L380 470 L520 610 Z" fill="#0a5f6e"/>
  <path d="M620 605 L700 520 L800 605 Z" fill="#0a5f6e"/>
  <path d="M1050 610 L1180 480 L1340 610 Z" fill="#0a5f6e"/>
  <path d="M1380 605 L1480 520 L1600 605 Z" fill="#0a5f6e"/>

  <!-- sea -->
  <rect x="0" y="600" width="1600" height="400" fill="url(#sea)"/>
  <rect x="0" y="600" width="1600" height="160" fill="url(#seaGlow)"/>

  <!-- gentle wave lines -->
  <path d="M0 700 Q100 690 200 700 T400 700 T600 700 T800 700 T1000 700 T1200 700 T1400 700 T1600 700" stroke="#ffffff" stroke-opacity="0.15" stroke-width="4" fill="none"/>
  <path d="M0 760 Q100 750 200 760 T400 760 T600 760 T800 760 T1000 760 T1200 760 T1400 760 T1600 760" stroke="#ffffff" stroke-opacity="0.1" stroke-width="4" fill="none"/>
  <path d="M0 840 Q100 830 200 840 T400 840 T600 840 T800 840 T1000 840 T1200 840 T1400 840 T1600 840" stroke="#ffffff" stroke-opacity="0.08" stroke-width="4" fill="none"/>

  <!-- longtail boat -->
  <g transform="translate(1080,640)">
    <path d="M0 40 C 40 60, 160 60, 220 40 L 200 60 C 150 75, 50 75, 10 60 Z" fill="#3a2a1f"/>
    <rect x="40" y="10" width="6" height="34" fill="#3a2a1f"/>
    <path d="M40 12 L150 -40" stroke="#3a2a1f" stroke-width="5" fill="none"/>
    <path d="M70 -10 L70 -55 L100 -10 Z" fill="#f4ede1" opacity="0.85"/>
  </g>

  <!-- palm tree silhouette - left -->
  <g transform="translate(60,520)" fill="#06303a">
    <path d="M40 220 C 30 140 35 80 50 0 L 60 0 C 50 80 48 150 58 220 Z"/>
    <path d="M50 10 C 0 -10 -50 5 -70 40 C -20 30 20 25 50 30 Z"/>
    <path d="M50 10 C 100 -15 150 0 175 35 C 125 22 85 22 50 30 Z"/>
    <path d="M50 5 C 20 -30 -10 -55 -40 -60 C -5 -40 25 -15 50 15 Z"/>
    <path d="M52 5 C 85 -35 120 -55 155 -55 C 115 -35 80 -10 52 15 Z"/>
    <path d="M50 8 C 45 -35 45 -70 35 -100 C 55 -75 60 -40 55 8 Z"/>
  </g>

  <!-- palm tree silhouette - right -->
  <g transform="translate(1480,470) scale(1.2)" fill="#06303a">
    <path d="M40 220 C 30 140 35 80 50 0 L 60 0 C 50 80 48 150 58 220 Z"/>
    <path d="M50 10 C 0 -10 -50 5 -70 40 C -20 30 20 25 50 30 Z"/>
    <path d="M50 10 C 100 -15 150 0 175 35 C 125 22 85 22 50 30 Z"/>
    <path d="M50 5 C 20 -30 -10 -55 -40 -60 C -5 -40 25 -15 50 15 Z"/>
    <path d="M52 5 C 85 -35 120 -55 155 -55 C 115 -35 80 -10 52 15 Z"/>
    <path d="M50 8 C 45 -35 45 -70 35 -100 C 55 -75 60 -40 55 8 Z"/>
  </g>

  <!-- foreground sand -->
  <path d="M0 1000 L0 880 C 300 920 600 850 900 900 C 1200 945 1400 880 1600 920 L1600 1000 Z" fill="#f3e3c3"/>
</svg>
